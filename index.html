<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Forever — Premium Fashion & Apparel Store</title>
    <meta
      name="description"
      content="Shop Forever for premium quality fashion — men's, women's & kids' clothing with exclusive offers, easy returns, and fast delivery. Elevate your style today."
    />
    <meta
      name="keywords"
      content="fashion, apparel, clothing, men's fashion, women's fashion, kids clothing, premium clothes, online shopping, Forever store"
    />
    <meta name="author" content="Forever Fashion" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.foreverstore.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Forever" />
    <meta
      property="og:title"
      content="Forever — Premium Fashion & Apparel Store"
    />
    <meta
      property="og:description"
      content="Discover premium quality fashion for everyone. Shop the latest collections, exclusive deals, and enjoy fast delivery & easy returns at Forever."
    />
    <meta property="og:url" content="https://www.foreverstore.com/" />
    <meta
      property="og:image"
      content="https://www.foreverstore.com/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ForeverFashion" />
    <meta
      name="twitter:title"
      content="Forever — Premium Fashion & Apparel Store"
    />
    <meta
      name="twitter:description"
      content="Discover premium quality fashion for everyone. Shop the latest collections, exclusive deals, and enjoy fast delivery & easy returns at Forever."
    />
    <meta
      name="twitter:image"
      content="https://www.foreverstore.com/og-image.jpg"
    />

    <!-- Performance: Preconnect to Google Fonts origin -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ClothingStore",
        "name": "Forever",
        "url": "https://www.foreverstore.com",
        "logo": "https://www.foreverstore.com/favicon.png",
        "description": "Premium quality fashion and apparel for men, women, and kids.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "547 Joseph Street",
          "addressLocality": "New York",
          "addressRegion": "NY",
          "postalCode": "10001",
          "addressCountry": "US"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+1-555-123-4567",
          "contactType": "customer service",
          "availableLanguage": "English"
        },
        "sameAs": [
          "https://www.instagram.com/foreverbrand",
          "https://www.twitter.com/ForeverFashion",
          "https://www.facebook.com/foreverbrand"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
